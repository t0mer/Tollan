openapi: 3.0.3
info:
  title: Tollan API
  description: >
    REST API for Tollan, a self-hosted log management server. Everything the web
    UI does is available through this API. During bootstrap (no admin user yet,
    or auth disabled) the API is open; otherwise it requires a session cookie or
    a Bearer API token.
  version: 0.1.0
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: /
tags:
  - name: system
    description: Health and build information.
  - name: auth
    description: Authentication, users and API tokens.
  - name: search
    description: Log search.
  - name: inputs
    description: Ingest inputs.
  - name: streams
    description: Message streams.
  - name: pipelines
    description: Pipelines, rules and lookup tables.
  - name: dashboards
    description: Dashboards and widgets.
  - name: alerts
    description: Events, definitions and notification channels.
  - name: outputs
    description: Message forwarding outputs.
paths:
  /health:
    get:
      tags: [system]
      summary: Liveness/readiness probe.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /api/v1/auth/status:
    get: { tags: [auth], summary: Auth mode and whether first-run setup is needed., operationId: authStatus, security: [], responses: { "200": { description: Status. } } }
  /api/v1/auth/setup:
    post: { tags: [auth], summary: Create the first admin (first-run only)., operationId: authSetup, security: [], responses: { "201": { description: Created. }, "409": { description: Already set up. } } }
  /api/v1/auth/login:
    post: { tags: [auth], summary: Log in (sets a session cookie)., operationId: authLogin, security: [], responses: { "200": { description: Logged in. }, "401": { description: Invalid credentials. } } }
  /api/v1/auth/logout:
    post: { tags: [auth], summary: Log out., operationId: authLogout, responses: { "204": { description: Logged out. } } }
  /api/v1/auth/me:
    get: { tags: [auth], summary: Current user., operationId: authMe, responses: { "200": { description: User. } } }
  /api/v1/users:
    get: { tags: [auth], summary: List users (admin)., operationId: listUsers, responses: { "200": { description: Users. } } }
    post: { tags: [auth], summary: Create a user (admin)., operationId: createUser, responses: { "201": { description: Created. } } }
  /api/v1/users/{id}:
    put:
      tags: [auth]
      summary: Update a user's role/password (admin).
      operationId: updateUser
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: Updated. } }
    delete:
      tags: [auth]
      summary: Delete a user (admin).
      operationId: deleteUser
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: Deleted. } }
  /api/v1/tokens:
    get: { tags: [auth], summary: List your API tokens., operationId: listTokens, responses: { "200": { description: Tokens. } } }
    post: { tags: [auth], summary: Create an API token (returned once)., operationId: createToken, responses: { "201": { description: Created. } } }
  /api/v1/tokens/{id}:
    delete:
      tags: [auth]
      summary: Revoke an API token.
      operationId: deleteToken
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: Revoked. } }
  /api/v1/version:
    get:
      tags: [system]
      summary: Build/version information.
      operationId: getVersion
      responses:
        "200":
          description: Version details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
  /api/v1/search:
    get:
      tags: [search]
      summary: Search stored log messages.
      operationId: search
      parameters:
        - { name: q, in: query, schema: { type: string }, description: "Full-text match over the message body (FTS5 syntax)." }
        - { name: from, in: query, schema: { type: string }, description: "RFC3339 or relative (now, now-15m)." }
        - { name: to, in: query, schema: { type: string }, description: "RFC3339 or relative (now, now-15m)." }
        - { name: stream, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 1000 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
        - { name: order, in: query, schema: { type: string, enum: [asc, desc], default: desc } }
      responses:
        "200":
          description: Matching messages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"
  /api/v1/search/histogram:
    get:
      tags: [search]
      summary: Time histogram of a query's matches.
      operationId: searchHistogram
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
        - { name: stream, in: query, schema: { type: string } }
      responses:
        "200":
          description: Histogram buckets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Histogram"
  /api/v1/search/fields:
    get:
      tags: [search]
      summary: Field facets (top values) over a query's result sample.
      operationId: searchFields
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
        - { name: stream, in: query, schema: { type: string } }
        - { name: sample, in: query, schema: { type: integer, default: 500, maximum: 2000 } }
        - { name: top, in: query, schema: { type: integer, default: 8 } }
      responses:
        "200":
          description: Field facets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FieldFacet"
  /api/v1/saved-searches:
    get:
      tags: [search]
      summary: List saved searches.
      operationId: listSavedSearches
      responses:
        "200":
          description: Saved searches.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SavedSearch" }
    post:
      tags: [search]
      summary: Create a saved search.
      operationId: createSavedSearch
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SavedSearchInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavedSearch" }
  /api/v1/saved-searches/{id}:
    put:
      tags: [search]
      summary: Update a saved search.
      operationId: updateSavedSearch
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SavedSearchInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavedSearch" }
        "404": { description: Not found. }
    delete:
      tags: [search]
      summary: Delete a saved search.
      operationId: deleteSavedSearch
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted. }
        "404": { description: Not found. }
  /api/v1/search/aggregate:
    get:
      tags: [search]
      summary: Group-by aggregation over a query.
      operationId: aggregate
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
        - { name: group_by, in: query, schema: { type: string } }
        - { name: metric, in: query, schema: { type: string, enum: [count, sum, avg, min, max, p50, p90, p95, p99] } }
        - { name: metric_field, in: query, schema: { type: string } }
      responses: { "200": { description: Aggregation rows. } }
  /api/v1/search/export:
    get:
      tags: [search]
      summary: Export query results as CSV or JSON.
      operationId: exportSearch
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: format, in: query, schema: { type: string, enum: [csv, json] } }
      responses: { "200": { description: Export stream. } }
  /api/v1/dashboards:
    get:
      tags: [dashboards]
      summary: List dashboards.
      operationId: listDashboards
      responses: { "200": { description: Dashboards. } }
    post:
      tags: [dashboards]
      summary: Create a dashboard.
      operationId: createDashboard
      responses: { "201": { description: Created. } }
  /api/v1/dashboards/{id}:
    put:
      tags: [dashboards]
      summary: Update a dashboard.
      operationId: updateDashboard
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: Updated. } }
    delete:
      tags: [dashboards]
      summary: Delete a dashboard.
      operationId: deleteDashboard
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: Deleted. } }
  /api/v1/events:
    get:
      tags: [alerts]
      summary: List fired events (the event stream).
      operationId: listEvents
      responses: { "200": { description: Fired events. } }
  /api/v1/event-definitions:
    get: { tags: [alerts], summary: List event definitions., operationId: listEventDefs, responses: { "200": { description: Definitions. } } }
    post: { tags: [alerts], summary: Create an event definition., operationId: createEventDef, responses: { "201": { description: Created. } } }
  /api/v1/event-definitions/{id}:
    put:
      tags: [alerts]
      summary: Update an event definition.
      operationId: updateEventDef
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: Updated. } }
    delete:
      tags: [alerts]
      summary: Delete an event definition.
      operationId: deleteEventDef
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: Deleted. } }
  /api/v1/notifications:
    get: { tags: [alerts], summary: List notification channels (secrets masked)., operationId: listChannels, responses: { "200": { description: Channels. } } }
    post: { tags: [alerts], summary: Create a channel., operationId: createChannel, responses: { "201": { description: Created. } } }
  /api/v1/notifications/test:
    post: { tags: [alerts], summary: Send a real test notification., operationId: testChannel, responses: { "200": { description: Sent. }, "502": { description: Delivery failed. } } }
  /api/v1/notifications/{id}:
    put:
      tags: [alerts]
      summary: Update a channel.
      operationId: updateChannel
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: Updated. } }
    delete:
      tags: [alerts]
      summary: Delete a channel.
      operationId: deleteChannel
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: Deleted. } }
  /api/v1/outputs:
    get: { tags: [outputs], summary: List outputs., operationId: listOutputs, responses: { "200": { description: Outputs. } } }
    post: { tags: [outputs], summary: Create an output., operationId: createOutput, responses: { "201": { description: Created. } } }
  /api/v1/outputs/{id}:
    put:
      tags: [outputs]
      summary: Update an output.
      operationId: updateOutput
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: Updated. } }
    delete:
      tags: [outputs]
      summary: Delete an output.
      operationId: deleteOutput
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: Deleted. } }
  /api/v1/content-packs/export:
    get: { tags: [system], summary: Export a content pack (JSON bundle)., operationId: exportContentPack, responses: { "200": { description: Bundle. } } }
  /api/v1/content-packs/import:
    post:
      tags: [system]
      summary: Import a content pack (dry_run=true previews).
      operationId: importContentPack
      parameters: [{ name: dry_run, in: query, schema: { type: boolean } }]
      responses: { "200": { description: Import result / diff. } }
  /api/v1/inputs:
    get:
      tags: [inputs]
      summary: List configured inputs and their status.
      operationId: listInputs
      responses:
        "200":
          description: Inputs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Input"
  /api/v1/streams:
    get:
      tags: [streams]
      summary: List streams.
      operationId: listStreams
      responses:
        "200": { description: Streams., content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Stream" } } } } }
    post:
      tags: [streams]
      summary: Create a stream.
      operationId: createStream
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/Stream" } } } }
      responses:
        "201": { description: Created., content: { application/json: { schema: { $ref: "#/components/schemas/Stream" } } } }
  /api/v1/streams/{id}:
    put:
      tags: [streams]
      summary: Update a stream.
      operationId: updateStream
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/Stream" } } } }
      responses: { "200": { description: Updated. } }
    delete:
      tags: [streams]
      summary: Delete a stream.
      operationId: deleteStream
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: Deleted. } }
  /api/v1/pipelines:
    get:
      tags: [pipelines]
      summary: List pipelines.
      operationId: listPipelines
      responses:
        "200": { description: Pipelines., content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Pipeline" } } } } }
    post:
      tags: [pipelines]
      summary: Create a pipeline.
      operationId: createPipeline
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/Pipeline" } } } }
      responses: { "201": { description: Created. } }
  /api/v1/pipelines/{id}:
    put:
      tags: [pipelines]
      summary: Update a pipeline.
      operationId: updatePipeline
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/Pipeline" } } } }
      responses: { "200": { description: Updated. } }
    delete:
      tags: [pipelines]
      summary: Delete a pipeline.
      operationId: deletePipeline
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: Deleted. } }
  /api/v1/lookups:
    get:
      tags: [pipelines]
      summary: List lookup tables.
      operationId: listLookups
      responses: { "200": { description: Lookup tables. } }
    post:
      tags: [pipelines]
      summary: Create a lookup table.
      operationId: createLookup
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/LookupConfig" } } } }
      responses: { "201": { description: Created. } }
  /api/v1/lookups/{id}:
    put:
      tags: [pipelines]
      summary: Update a lookup table.
      operationId: updateLookup
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/LookupConfig" } } } }
      responses: { "200": { description: Updated. } }
    delete:
      tags: [pipelines]
      summary: Delete a lookup table.
      operationId: deleteLookup
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "204": { description: Deleted. } }
components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      description: Per-user, named, revocable API token.
    sessionCookie:
      type: apiKey
      in: cookie
      name: tollan_session
  schemas:
    Health:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 2026.7.0
    Version:
      type: object
      required: [version, commit, date, go]
      properties:
        version:
          type: string
        commit:
          type: string
        date:
          type: string
        go:
          type: string
    Message:
      type: object
      properties:
        id: { type: string }
        timestamp: { type: string, format: date-time }
        received_at: { type: string, format: date-time }
        source: { type: string }
        stream: { type: string }
        input_id: { type: string }
        message: { type: string }
        fields:
          type: object
          additionalProperties: true
    SearchResult:
      type: object
      properties:
        total: { type: integer, description: "Total matches across the time range." }
        count: { type: integer, description: "Number of messages in this page." }
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
    Bucket:
      type: object
      properties:
        start_ms: { type: integer, format: int64 }
        count: { type: integer }
    Histogram:
      type: object
      properties:
        interval_ms: { type: integer, format: int64 }
        buckets:
          type: array
          items: { $ref: "#/components/schemas/Bucket" }
    FacetValue:
      type: object
      properties:
        value: { type: string }
        count: { type: integer }
    FieldFacet:
      type: object
      properties:
        field: { type: string }
        values:
          type: array
          items: { $ref: "#/components/schemas/FacetValue" }
    SavedSearchInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        query: { type: string }
        time_range: { type: string }
    SavedSearch:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        query: { type: string }
        time_range: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Input:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        bind: { type: string }
        protocol: { type: string, enum: [udp, tcp, tls, http] }
        running: { type: boolean }
    MatchRule:
      type: object
      properties:
        field: { type: string }
        type: { type: string, enum: [exact, regex, presence, contains, gt, lt] }
        value: { type: string }
        negate: { type: boolean }
    Stream:
      type: object
      required: [name]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        combinator: { type: string, enum: [and, or] }
        rules: { type: array, items: { $ref: "#/components/schemas/MatchRule" } }
        retention_days: { type: integer }
        field_types: { type: object, additionalProperties: { type: string } }
    PipelineRule:
      type: object
      properties:
        name: { type: string }
        when: { type: string }
        then: { type: array, items: { type: string } }
    Pipeline:
      type: object
      required: [name]
      properties:
        id: { type: string }
        name: { type: string }
        enabled: { type: boolean }
        stages: { type: array, items: { type: string } }
        rules: { type: array, items: { $ref: "#/components/schemas/PipelineRule" } }
    LookupConfig:
      type: object
      required: [name, source_type, source]
      properties:
        id: { type: string }
        name: { type: string }
        source_type: { type: string, enum: [file, url] }
        source: { type: string }
        key_column: { type: string }
        value_column: { type: string }
security:
  - bearerToken: []
  - sessionCookie: []
