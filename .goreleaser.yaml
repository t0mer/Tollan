version: 2

project_name: tollan

before:
  hooks:
    - go mod tidy
    # Build the embedded UI before compiling the Go binaries.
    - bash -c "cd web && npm ci && npm run build && touch dist/.gitkeep"

builds:
  - id: tollan
    main: ./cmd/tollan
    binary: tollan
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/t0mer/tollan/internal/version.Version={{ .Version }}
      - -X github.com/t0mer/tollan/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/t0mer/tollan/internal/version.Date={{ .Date }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64, arm, "386"]
    goarm: ["6", "7"]
    ignore:
      - { goos: darwin, goarch: arm }
      - { goos: darwin, goarch: "386" }
      - { goos: windows, goarch: arm }
      - { goos: windows, goarch: "386" }

  - id: tollan-agent
    main: ./cmd/tollan-agent
    binary: tollan-agent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/t0mer/tollan/internal/version.Version={{ .Version }}
      - -X github.com/t0mer/tollan/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/t0mer/tollan/internal/version.Date={{ .Date }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64, arm, "386"]
    goarm: ["6", "7"]
    ignore:
      - { goos: darwin, goarch: arm }
      - { goos: darwin, goarch: "386" }
      - { goos: windows, goarch: arm }
      - { goos: windows, goarch: "386" }

archives:
  - id: default
    ids: [tollan, tollan-agent]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - config.example.yaml

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

release:
  draft: false
  prerelease: auto
